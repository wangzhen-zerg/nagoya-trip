<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 招财猫背景圆 -->
  <circle cx="16" cy="16" r="15" fill="#BC002D"/>
  <!-- 招财猫头部 -->
  <ellipse cx="16" cy="12" rx="8" ry="7" fill="#fff"/>
  <!-- 招财猫耳朵 -->
  <path d="M8 8 L6 3 L11 6 Z" fill="#fff"/>
  <path d="M24 8 L26 3 L21 6 Z" fill="#fff"/>
  <!-- 招财猫眼睛 -->
  <ellipse cx="12" cy="11" rx="1.5" ry="2" fill="#333"/>
  <ellipse cx="20" cy="11" rx="1.5" ry="2" fill="#333"/>
  <!-- 招财猫鼻子 -->
  <ellipse cx="16" cy="14" rx="1" ry="0.8" fill="#FFB6C1"/>
  <!-- 招财猫胡须 -->
  <line x1="6" y1="13" x2="10" y2="13.5" stroke="#ccc" stroke-width="0.5"/>
  <line x1="6" y1="15" x2="10" y2="14.5" stroke="#ccc" stroke-width="0.5"/>
  <line x1="26" y1="13" x2="22" y2="13.5" stroke="#ccc" stroke-width="0.5"/>
  <line x1="26" y1="15" x2="22" y2="14.5" stroke="#ccc" stroke-width="0.5"/>
  <!-- 招财猫身体 -->
  <ellipse cx="16" cy="23" rx="9" ry="6" fill="#fff"/>
  <!-- 招财猫铃铛 -->
  <circle cx="16" cy="20" r="1.5" fill="#FFD700"/>
  <!-- 举起的手（招财动作） -->
  <ellipse cx="23" cy="16" rx="2.5" ry="4" fill="#fff" transform="rotate(-20 23 16)"/>
  <!-- 钱币装饰 -->
  <circle cx="11" cy="24" r="2" fill="#FFD700" opacity="0.8"/>
  <circle cx="21" cy="24" r="2" fill="#FFD700" opacity="0.8"/>
</svg>
